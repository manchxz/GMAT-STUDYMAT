services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gmat
      POSTGRES_PASSWORD: gmat_local_secret_change_me
      POSTGRES_DB: gmat_trainer
    ports:
      - '5432:5432'
    volumes:
      - gmat_trainer_pg:/var/lib/postgresql/data

volumes:
  gmat_trainer_pg:
